<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Handshake - Residential Architects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Header Section -->
    <header class="header" id="main-header">
      <input type="checkbox" id="menu-toggle" class="menu-toggle" />

      <nav class="nav-left">
        <a href="#about" class="nav-link" id="nav-about">About</a>
        <a href="#portfolio" class="nav-link" id="nav-portfolio">Portfolio</a>
        <a href="#services" class="nav-link" id="nav-services">Services</a>
      </nav>

      <div class="logo">
        <a href="#" class="logo-link" id="nav-logo">Handshake</a>
      </div>

      <nav class="nav-right">
        <a href="#team" class="nav-link" id="nav-team">Team</a>
        <a href="#contact" class="nav-link" id="nav-contact">Contact</a>
        <a href="#newsletter" class="nav-link" id="nav-newsletter"
          >Newsletter</a
        >
      </nav>
    </header>

    <!-- Hero Section -->
    <main class="hero" id="hero-section">
      <div class="hero-container">
        <!-- Big Typography Title (Background Layer) -->
        <h1 class="hero-title">
          <span class="title-line">Residential</span>
          <span class="title-line">Architects</span>
        </h1>

        <!-- Elegant Photo Card (Foreground Layer) -->
        <div class="hero-image-wrapper" id="hero-image-wrapper">
          <img src="./assets/hero.webp" alt="hero image" class="hero-image" />
        </div>

        <!-- Left Bottom Scroll Indicator -->
        <div class="hero-indicator left-indicator">
          <span>SCROLL</span>
          <span>DOWN</span>
        </div>

        <!-- Right Bottom Location Indicator -->
        <div class="hero-indicator right-indicator" id="location-indicator">
          <span>Based In</span>
          <span>Seattle</span>
        </div>
      </div>
    </main>
  </body>
</html>
